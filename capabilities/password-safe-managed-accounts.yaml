naftiko: 1.0.0-alpha2
info:
  label: BeyondTrust Password Safe API — Managed Accounts
  description: 'BeyondTrust Password Safe API — Managed Accounts. 1 operations. Lead operation: BeyondTrust List Managed Accounts.
    Self-contained Naftiko capability covering one Beyondtrust business surface.'
  tags:
  - Beyondtrust
  - Managed Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BEYONDTRUST_API_KEY: BEYONDTRUST_API_KEY
capability:
  consumes:
  - type: http
    namespace: password-safe-managed-accounts
    baseUri: https://{hostname}/BeyondTrust/api/public/v3
    description: BeyondTrust Password Safe API — Managed Accounts business capability. Self-contained, no shared references.
    resources:
    - name: managedaccounts
      path: /managedaccounts
      operations:
      - name: listmanagedaccounts
        method: GET
        description: BeyondTrust List Managed Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: systemName
          in: query
          type: string
          description: Filter accounts by system name.
        - name: accountName
          in: query
          type: string
          description: Filter by account name.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.BEYONDTRUST_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: password-safe-managed-accounts-rest
    port: 8080
    description: REST adapter for BeyondTrust Password Safe API — Managed Accounts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/managedaccounts
      name: managedaccounts
      description: REST surface for managedaccounts.
      operations:
      - method: GET
        name: listmanagedaccounts
        description: BeyondTrust List Managed Accounts
        call: password-safe-managed-accounts.listmanagedaccounts
        with:
          systemName: rest.systemName
          accountName: rest.accountName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: password-safe-managed-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for BeyondTrust Password Safe API — Managed Accounts. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: beyondtrust-list-managed-accounts
      description: BeyondTrust List Managed Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: password-safe-managed-accounts.listmanagedaccounts
      with:
        systemName: tools.systemName
        accountName: tools.accountName
      outputParameters:
      - type: object
        mapping: $.
