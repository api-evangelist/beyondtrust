naftiko: "1.0.0-alpha1"

info:
  label: BeyondTrust Password Safe API
  description: >-
    BeyondTrust Password Safe API for privileged access management, credential
    retrieval, secrets management, and access request workflows.
  tags:
    - BeyondTrust
    - Privileged Access Management
    - Secrets Management
    - Security
    - Zero Trust
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      BEYONDTRUST_HOST: BEYONDTRUST_HOST
      BEYONDTRUST_APP_ID: BEYONDTRUST_APP_ID
      BEYONDTRUST_API_KEY: BEYONDTRUST_API_KEY

capability:
  consumes:
    - type: http
      namespace: beyondtrust
      baseUri: "https://{{BEYONDTRUST_HOST}}/BeyondTrust/api/public/v3"
      description: BeyondTrust Password Safe API
      authentication:
        type: apikey
        key: Authorization
        value: "PS-Auth key={{BEYONDTRUST_API_KEY}}; runas={{BEYONDTRUST_APP_ID}}"
        placement: header
      resources:
        - name: requests
          path: /requests
          description: Privileged access request management
          operations:
            - name: list-requests
              method: GET
              description: List all active access requests
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-request
              method: POST
              description: Create a new access request
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  SystemID: "{{tools.system_id}}"
                  AccountID: "{{tools.account_id}}"
                  DurationMinutes: "{{tools.duration_minutes}}"
                  Reason: "{{tools.reason}}"
                  AccessType: "{{tools.access_type}}"
            - name: get-request
              method: GET
              description: Get a request by ID
              inputParameters:
                - name: requestId
                  in: path
                  type: integer
                  required: true
                  description: Request ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-request
              method: PUT
              description: Approve, deny, or cancel a request
              inputParameters:
                - name: requestId
                  in: path
                  type: integer
                  required: true
                  description: Request ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Action: "{{tools.action}}"
            - name: delete-request
              method: DELETE
              description: Cancel and delete a request
              inputParameters:
                - name: requestId
                  in: path
                  type: integer
                  required: true
                  description: Request ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-request-credentials
              method: GET
              description: Get credentials for an approved request
              inputParameters:
                - name: requestId
                  in: path
                  type: integer
                  required: true
                  description: Request ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: managed-accounts
          path: /managedaccounts
          description: Privileged account management
          operations:
            - name: list-managed-accounts
              method: GET
              description: List managed accounts
              inputParameters:
                - name: systemName
                  in: query
                  type: string
                  required: false
                  description: Filter by system name
                - name: accountName
                  in: query
                  type: string
                  required: false
                  description: Filter by account name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: managed-systems
          path: /managedsystems
          description: System management
          operations:
            - name: list-managed-systems
              method: GET
              description: List managed systems
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: secrets
          path: /secrets-safe/secrets
          description: Secrets management
          operations:
            - name: list-secrets
              method: GET
              description: List secrets
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-secret
              method: POST
              description: Create a new secret
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  type: "{{tools.type}}"
                  password: "{{tools.password}}"
            - name: get-secret
              method: GET
              description: Get a secret by ID including its value
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Secret ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-secret
              method: DELETE
              description: Delete a secret
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Secret ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: beyondtrust-rest
      resources:
        - path: /v1/requests
          name: requests
          description: PAM access requests
          operations:
            - method: GET
              name: list-requests
              description: List access requests
              call: "beyondtrust.list-requests"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/secrets
          name: secrets
          description: Secrets management
          operations:
            - method: GET
              name: list-secrets
              description: List secrets
              call: "beyondtrust.list-secrets"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: beyondtrust-mcp
      transport: http
      description: MCP server for AI-assisted BeyondTrust PAM operations
      tools:
        - name: list-managed-accounts
          description: List privileged accounts available for access requests
          hints:
            readOnly: true
            openWorld: true
          call: "beyondtrust.list-managed-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-managed-systems
          description: List systems registered in Password Safe
          hints:
            readOnly: true
          call: "beyondtrust.list-managed-systems"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-request
          description: Create an access request for a privileged account
          hints:
            readOnly: false
            destructive: false
          call: "beyondtrust.create-request"
          with:
            system_id: "tools.system_id"
            account_id: "tools.account_id"
            duration_minutes: "tools.duration_minutes"
            reason: "tools.reason"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-request-credentials
          description: Retrieve credentials for an approved access request
          hints:
            readOnly: true
          call: "beyondtrust.get-request-credentials"
          with:
            requestId: "tools.request_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-secrets
          description: List secrets in the secrets safe
          hints:
            readOnly: true
          call: "beyondtrust.list-secrets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-secret
          description: Retrieve a secret value from secrets safe
          hints:
            readOnly: true
          call: "beyondtrust.get-secret"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
