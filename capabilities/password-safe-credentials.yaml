naftiko: 1.0.0-alpha2
info:
  label: BeyondTrust Password Safe API — Credentials
  description: 'BeyondTrust Password Safe API — Credentials. 1 operations. Lead operation: BeyondTrust Get Request Credentials.
    Self-contained Naftiko capability covering one Beyondtrust business surface.'
  tags:
  - Beyondtrust
  - Credentials
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BEYONDTRUST_API_KEY: BEYONDTRUST_API_KEY
capability:
  consumes:
  - type: http
    namespace: password-safe-credentials
    baseUri: https://{hostname}/BeyondTrust/api/public/v3
    description: BeyondTrust Password Safe API — Credentials business capability. Self-contained, no shared references.
    resources:
    - name: requests-requestId-credentials
      path: /requests/{requestId}/credentials
      operations:
      - name: getrequestcredentials
        method: GET
        description: BeyondTrust Get Request Credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: requestId
          in: path
          type: integer
          description: The unique identifier of the approved request.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.BEYONDTRUST_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: password-safe-credentials-rest
    port: 8080
    description: REST adapter for BeyondTrust Password Safe API — Credentials. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/requests/{requestid}/credentials
      name: requests-requestid-credentials
      description: REST surface for requests-requestId-credentials.
      operations:
      - method: GET
        name: getrequestcredentials
        description: BeyondTrust Get Request Credentials
        call: password-safe-credentials.getrequestcredentials
        with:
          requestId: rest.requestId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: password-safe-credentials-mcp
    port: 9090
    transport: http
    description: MCP adapter for BeyondTrust Password Safe API — Credentials. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: beyondtrust-get-request-credentials
      description: BeyondTrust Get Request Credentials
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: password-safe-credentials.getrequestcredentials
      with:
        requestId: tools.requestId
      outputParameters:
      - type: object
        mapping: $.
